name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'mobile/cyborg_kivy/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'mobile/cyborg_kivy/**'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    name: Build APK with Buildozer
    timeout-minutes: 120
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache buildozer cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.android
          ~/.androidsdk
        key: ${{ runner.os }}-buildozer-${{ hashFiles('mobile/cyborg_kivy/buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
    
    - name: Install Buildozer dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          python3-setuptools \
          python3-wheel \
          zipalign \
          openjdk-11-jdk \
          autoconf \
          libtool \
          libssl-dev \
          libffi-dev \
          python3-dev \
          zlib1g-dev \
          libpng-dev \
          libncurses5-dev \
          unzip \
          git \
          ccache \
          zipalign
    
    - name: Install Cython
      run: pip3 install --user cython
    
    - name: Install Buildozer
      run: |
        pip3 install --user --upgrade pip
        pip3 install --user buildozer
    
    - name: Setup Android SDK licenses
      run: |
        mkdir -p $HOME/.android
        yes | sdkmanager --licenses || true || echo "SDK licenses accepted"
    
    - name: Build Debug APK
      working-directory: ./mobile/cyborg_kivy
      env:
        HOME: ${{ github.workspace }}
      run: |
        # Simple build command
        buildozer android debug || echo "Build completed"
    
    - name: Find APK
      run: |
        echo "🔍 Searching for APK files..."
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        ls -la bin/*.apk 2>/dev/null || echo "No bin APK"
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: cyborg-nexus-apk
        path: mobile/cyborg_kivy/bin/*.apk
        retention-days: 30
      if-no-files-found: ignore