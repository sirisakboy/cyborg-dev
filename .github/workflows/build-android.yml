name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'mobile/cyborg_kivy/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'mobile/cyborg_kivy/**'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    name: Build APK with Buildozer
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Buildozer dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          python3-setuptools \
          python3-wheel \
          python3-venv \
          zipalign \
          openjdk-11-jdk \
          autoconf \
          libtool \
          libssl-dev \
          libffi-dev \
          python3-dev \
          zlib1g-dev \
          libpng-dev \
          libncurses5-dev \
          unzip \
          git \
          unzip zipalign
    
    - name: Install Buildozer
      run: |
        pip3 install --user --upgrade pip
        pip3 install --user buildozer
    
    - name: Accept Android SDK licenses
      run: |
        mkdir -p $HOME/.android
        echo "y" | buildozer android update
    
    - name: Build Debug APK
      working-directory: ./mobile/cyborg_kivy
      run: |
        buildozer android debug
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: cyborg-nexus-apk
        path: mobile/cyborg_kivy/bin/*.apk
        retention-days: 30

    - name: Release APK (optional)
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: mobile/cyborg_kivy/bin/*.apk
        asset_name: cyborg-nexus.apk
        asset_content_type: application/vnd.android.package-archive